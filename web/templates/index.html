<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegacyLens - AI-Powered COBOL Insights</title>
    <style>
        @font-face {
            font-family: 'Monofonto';
            src: url('/static/fonts/monofonto.woff') format('woff');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Fixedsys Excelsior 3.01';
            src: url('/static/fonts/FSEX300.woff') format('woff');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        /* JH_Fallout: Pip-Boy 2000 font from Fallout 1, 2 & Tactics */
        @font-face {
            font-family: 'JH Fallout';
            src: url('/static/fonts/JH_Fallout.woff') format('woff'),
                 url('/static/fonts/JH_Fallout.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'IBM 3270';
            src: url('/static/fonts/3270-Regular.woff') format('woff'),
                 url('/static/fonts/3270-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        /* ── Design Tokens ── */
        :root {
            --bg-primary: #1a1e24;
            --bg-panel: #232830;
            --bg-answer: #faf3e0;
            --border-panel: #3a4050;
            --border-accent: #d4a24e;
            --text-primary: #e8e0d0;
            --text-answer: #2a2520;
            --text-label: #d4a24e;
            --text-muted: #6a7080;
            --accent-green: #4ade80;
            --accent-teal: #2dd4bf;
            --accent-danger: #ef4444;
            --score-high: #4ade80;
            --score-mid: #d4a24e;
            --score-low: #6a7080;
            --font-display: 'Monofonto', monospace;
            --font-body: 'Fixedsys Excelsior 3.01', monospace;
        }

        /* ── Reset & Base ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 16px;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Subtle scanline overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.03) 2px,
                rgba(0, 0, 0, 0.03) 4px
            );
            z-index: 9999;
        }

        /* ── Layout ── */
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 1.5rem 3rem;
        }

        /* ── Header ── */
        .header {
            padding: 2rem 0 1.5rem;
            border-bottom: 1px solid var(--border-panel);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-logo {
            width: 40px;
            height: 40px;
            border: 2px solid var(--accent-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--accent-green);
            font-size: 1.2rem;
            text-shadow: 0 0 8px rgba(74, 222, 128, 0.4);
            box-shadow: 0 0 8px rgba(74, 222, 128, 0.15);
        }

        .header-text h1 {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-label);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .header-text .subtitle {
            font-family: var(--font-display);
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* ── Search Bar ── */
        .search-row {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }

        .search-input {
            flex: 1;
            background: var(--bg-panel);
            border: 1px solid var(--border-panel);
            border-radius: 4px;
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input::placeholder { color: var(--text-muted); }

        .search-input:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.12);
        }

        .btn-analyze {
            background: var(--accent-green);
            color: var(--bg-primary);
            border: none;
            border-radius: 4px;
            padding: 0.75rem 1.5rem;
            font-family: var(--font-display);
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .btn-analyze:hover { background: var(--accent-teal); }
        .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── Suggest Button ── */
        .btn-suggest {
            background: var(--accent-green);
            color: var(--bg-primary);
            border: none;
            border-radius: 4px;
            padding: 0.75rem 1.5rem;
            font-family: var(--font-display);
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .btn-suggest:hover { background: var(--accent-teal); }

        /* ── Suggestions Panel ── */
        .suggestions-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease, padding 0.35s ease, margin 0.35s ease;
            background: var(--bg-panel);
            border: 1px solid var(--border-panel);
            border-radius: 4px;
            padding: 0 1rem;
            margin-bottom: 0;
        }

        .suggestions-panel.open {
            max-height: 300px;
            padding: 0.75rem 1rem;
            margin-bottom: 1.25rem;
        }

        .suggestions-label {
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-label);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .suggestions-list {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .suggestion-item {
            background: transparent;
            border: 1px solid var(--border-panel);
            border-radius: 3px;
            padding: 0.45rem 0.75rem;
            color: var(--accent-green);
            font-family: var(--font-body);
            font-size: 0.85rem;
            cursor: pointer;
            text-align: left;
            transition: background 0.2s, border-color 0.2s;
        }

        .suggestion-item:hover {
            background: rgba(74, 222, 128, 0.08);
            border-color: var(--accent-green);
        }

        /* ── Config Row ── */
        .config-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .config-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            min-width: 0;
        }

        .config-group.flex-1 { flex: 1; min-width: 140px; }

        .config-label {
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-label);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .config-select {
            background: var(--bg-panel);
            border: 1px solid var(--border-panel);
            border-radius: 4px;
            padding: 0.45rem 0.6rem;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .config-select:focus { border-color: var(--accent-green); }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 20px;
            cursor: pointer;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            inset: 0;
            background: var(--bg-primary);
            border: 1px solid var(--border-panel);
            border-radius: 10px;
            transition: background 0.2s, border-color 0.2s;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            left: 2px;
            bottom: 2px;
            background: var(--text-label);
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: var(--accent-green);
            border-color: var(--accent-green);
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(16px);
            background: var(--bg-primary);
        }

        /* ── Loading ── */
        #loading {
            display: none;
            margin: 2rem 0;
            text-align: center;
        }

        .loading-text {
            font-family: var(--font-display);
            font-size: 0.9rem;
            color: var(--accent-green);
            text-shadow: 0 0 8px rgba(74, 222, 128, 0.3);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .loading-bar {
            margin-top: 0.75rem;
            height: 2px;
            background: var(--border-panel);
            border-radius: 1px;
            overflow: hidden;
        }

        .loading-bar-inner {
            height: 100%;
            width: 30%;
            background: var(--accent-green);
            border-radius: 1px;
            animation: scan 1.5s ease-in-out infinite;
        }

        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }

        /* ── Answer Panel ── */
        #answer-box { display: none; }

        .answer-panel {
            position: relative;
            background: var(--bg-answer);
            border: 2px solid var(--border-accent);
            border-radius: 4px;
            padding: 1.5rem 2.75rem 1.25rem;
            margin-top: 1.5rem;
            min-height: 120px;
            --sprocket-line: calc(1rem * 1.75);
        }

        /* Tractor-feed sprocket strips */
        .answer-panel::before,
        .answer-panel::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1.75rem;
            background:
                /* The holes */
                radial-gradient(
                    circle 4px at 50% 50%,
                    var(--bg-primary) 3px,
                    rgba(0,0,0,0.08) 3px,
                    rgba(0,0,0,0.08) 4px,
                    transparent 4px
                ),
                /* Perforation line */
                linear-gradient(
                    to right,
                    transparent calc(100% - 1px),
                    rgba(0,0,0,0.1) calc(100% - 1px)
                );
            background-size:
                100% var(--sprocket-line),
                100% 100%;
            background-position: 0 calc(var(--sprocket-line) / 2);
            pointer-events: none;
        }

        .answer-panel::before {
            left: 0;
            border-right: 1px dashed rgba(0,0,0,0.08);
        }
        .answer-panel::after {
            right: 0;
            border-left: 1px dashed rgba(0,0,0,0.08);
        }

        .perf-bar {
            display: none;
            font-family: var(--font-display);
            font-size: 0.7rem;
            color: var(--accent-green);
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-panel);
            border-radius: 3px;
            padding: 0.4rem 0.8rem;
            margin-top: 0.6rem;
            letter-spacing: 0.04em;
            line-height: 1.6;
        }
        .perf-bar.visible { display: block; }
        .perf-bar .perf-item {
            display: inline-block;
            margin-right: 1.2rem;
        }
        .perf-bar .perf-label {
            color: var(--text-dim);
            text-transform: uppercase;
            margin-right: 0.3rem;
        }
        .perf-bar .perf-value {
            color: var(--accent-green);
        }
        .perf-bar .perf-cached {
            color: var(--border-accent);
        }

        .answer-label {
            position: absolute;
            top: -0.65rem;
            left: 1rem;
            background: var(--bg-panel);
            border: 1px solid var(--border-accent);
            border-radius: 3px;
            padding: 0.1rem 0.6rem;
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-label);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .stream-cursor {
            color: var(--text-answer);
            opacity: 0.6;
        }
        .stream-cursor::after {
            content: '\2588';
            animation: blink 0.8s step-end infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }

        #answer-content {
            color: var(--text-answer);
            font-family: var(--font-body);
            font-size: 1rem;
            line-height: 1.75;
        }

        /* Markdown element styles inside answer */
        #answer-content p { margin: 0.5em 0; }
        #answer-content p:first-child { margin-top: 0; }
        #answer-content p:last-child { margin-bottom: 0; }
        #answer-content h1, #answer-content h2, #answer-content h3, #answer-content h4 {
            color: var(--text-answer);
            font-family: var(--font-display);
            margin: 0.8em 0 0.3em;
        }
        #answer-content h1 { font-size: 1.3rem; }
        #answer-content h2 { font-size: 1.15rem; }
        #answer-content h3 { font-size: 1.05rem; }
        #answer-content h4 { font-size: 1rem; }
        #answer-content h1:first-child, #answer-content h2:first-child,
        #answer-content h3:first-child, #answer-content h4:first-child { margin-top: 0; }
        #answer-content code {
            font-family: var(--font-mono);
            font-size: 0.88em;
            background: rgba(0, 0, 0, 0.08);
            padding: 0.15em 0.35em;
            border-radius: 3px;
        }
        #answer-content pre {
            background: #2b2b2b;
            border: 1px solid var(--border-panel);
            border-radius: 4px;
            padding: 0.8em 1em;
            overflow-x: auto;
            margin: 0.6em 0;
        }
        #answer-content pre code {
            background: none;
            padding: 0;
            color: #c8d6c0;
            font-size: 0.85em;
        }
        #answer-content ul, #answer-content ol {
            margin: 0.4em 0;
            padding-left: 1.5em;
        }
        #answer-content li { margin: 0.2em 0; }
        #answer-content strong { color: var(--text-answer); }
        #answer-content a { color: var(--accent-green); }

        .error { color: var(--accent-danger); }

        /* ── Sources ── */
        .sources-section {
            margin-top: 1.25rem;
        }

        .sources-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            padding: 0.6rem 0;
            user-select: none;
        }

        .sources-header:hover .sources-title { color: var(--accent-teal); }

        .sources-title {
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-label);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.2s;
        }

        .sources-toggle {
            font-size: 0.7rem;
            color: var(--text-muted);
            transition: transform 0.2s;
        }

        .sources-section.collapsed .sources-toggle { transform: rotate(-90deg); }
        .sources-section.collapsed .sources-list { display: none; }

        .sources-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 0.25rem;
        }

        .source-item {
            background: var(--bg-panel);
            border-radius: 0 4px 4px 0;
            padding: 0.6rem 0.75rem;
        }

        .source-item.score-high { border-left: 3px solid var(--score-high); }
        .source-item.score-mid  { border-left: 3px solid var(--score-mid); }
        .source-item.score-low  { border-left: 3px solid var(--score-low); }

        .source-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
        }

        .source-file {
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .score-label {
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .score-label.high { color: var(--score-high); }
        .score-label.mid  { color: var(--score-mid); }
        .score-label.low  { color: var(--score-low); }

        .source-meta {
            font-family: var(--font-display);
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        .source-content {
            display: none;
            margin-top: 0.5rem;
            padding: 0.75rem 1rem;
            background: #0a0a0a;
            border: 1px solid #1a3a1a;
            border-radius: 4px;
            font-family: var(--font-body);
            font-size: 0.78rem;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
            overflow-x: auto;
            color: #33ff33;
            line-height: 1.5;
            text-shadow: 0 0 4px rgba(51, 255, 51, 0.3);
            /* Subtle CRT curvature via vignette */
            box-shadow:
                inset 0 0 60px rgba(0, 0, 0, 0.3),
                inset 0 0 1px rgba(51, 255, 51, 0.05);
        }

        .source-item.expanded .source-content { display: block; }

        .btn-context,
        .btn-file {
            display: inline-block;
            margin-top: 0.5rem;
            background: transparent;
            border: 1px solid var(--accent-green);
            border-radius: 3px;
            padding: 0.3rem 0.7rem;
            color: var(--accent-green);
            font-family: var(--font-display);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
        }

        .btn-context {
            margin-right: 0.5rem;
        }

        .btn-context:hover,
        .btn-file:hover {
            background: var(--accent-green);
            color: var(--bg-primary);
        }

        .btn-context:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ── Footer ── */
        .footer {
            margin-top: 2rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border-panel);
            text-align: center;
            font-family: var(--font-display);
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .header h1 { font-size: 1.5rem; }
            .search-row { flex-direction: column; }
            .btn-suggest { width: 100%; }
            .btn-analyze { width: 100%; }
            .config-row { flex-direction: column; }
            .config-group.flex-1 { min-width: 100%; }
            .answer-panel { padding: 1.25rem 1rem 1rem; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-logo">&#9762;</div>
            <div class="header-text">
                <h1>LegacyLens</h1>
                <div class="subtitle">AI-Powered COBOL Insights</div>
            </div>
        </header>

        <!-- Search -->
        <form id="query-form" onsubmit="return handleSubmit(event)">
            <div class="search-row">
                <button type="button" class="btn-suggest" onclick="toggleSuggestions()">Suggest</button>
                <input
                    type="text"
                    id="question"
                    class="search-input"
                    placeholder="Ask your COBOL question..."
                    required
                    autofocus
                >
                <button type="submit" class="btn-analyze" id="btn-submit">Analyze</button>
            </div>

            <!-- Suggestions -->
            <div class="suggestions-panel" id="suggestions-panel">
                <div class="suggestions-label">Suggested Questions</div>
                <div class="suggestions-list" id="suggestions-list"></div>
            </div>

            <!-- Config -->
            <div class="config-row">
                <div class="config-group flex-1">
                    <label class="config-label" for="cfg-model">Model</label>
                    <select id="cfg-model" class="config-select">
                        <option value="gpt-4o-mini">gpt-4o-mini</option>
                        <option value="gpt-4o">gpt-4o</option>
                        <option value="gpt-4.1-nano">gpt-4.1-nano</option>
                        <option value="gpt-4.1-mini">gpt-4.1-mini</option>
                        <option value="gpt-4.1">gpt-4.1</option>
                        <option value="gpt-5-nano">gpt-5-nano</option>
                        <option value="gpt-5-mini">gpt-5-mini</option>
                        <option value="gpt-5">gpt-5</option>
                        <option value="gpt-5-pro">gpt-5-pro</option>
                        <option value="gpt-5.1">gpt-5.1</option>
                        <option value="gpt-5.2">gpt-5.2</option>
                        <option value="gpt-5.2-pro">gpt-5.2-pro</option>
                        <option disabled>── OpenRouter ──</option>
                        <option value="google/gemini-2.5-flash">gemini-2.5-flash</option>
                        <option value="google/gemini-2.5-flash-lite">gemini-2.5-flash-lite</option>
                        <option value="meta-llama/llama-4-scout">llama-4-scout</option>
                        <option value="x-ai/grok-3-mini">grok-3-mini</option>
                        <option value="x-ai/grok-4.1-fast">grok-4.1-fast</option>
                        <option value="amazon/nova-lite">nova-lite</option>
                        <option value="amazon/nova-micro">nova-micro</option>
                        <option value="anthropic/claude-3.5-haiku">claude-3.5-haiku</option>
                        <option value="anthropic/claude-sonnet-4">claude-sonnet-4</option>
                        <option value="deepseek/deepseek-chat">deepseek-chat</option>
                    </select>
                </div>
                <div class="config-group flex-1">
                    <label class="config-label" for="cfg-filetype">File Type</label>
                    <select id="cfg-filetype" class="config-select">
                        <option value="">All files</option>
                        <option value="cbl">COBOL (.cbl)</option>
                        <option value="cpy">Copybooks (.cpy)</option>
                        <option value="bms">BMS Maps (.bms)</option>

        function toggleSuggestions() {
            const panel = document.getElementById('suggestions-panel');
            const isOpen = panel.classList.contains('open');
            if (isOpen) {
                panel.classList.remove('open');
                return;
            }
            // Pick 5 random suggestions
            const shuffled = SUGGESTIONS.slice().sort(() => 0.5 - Math.random());
            const picks = shuffled.slice(0, 5);
            const list = document.getElementById('suggestions-list');
            list.innerHTML = '';
            picks.forEach(function(text) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'suggestion-item';
                btn.textContent = text;
                btn.addEventListener('click', function() {
                    document.getElementById('question').value = text;
                    panel.classList.remove('open');
                    document.getElementById('query-form').requestSubmit();
                });
                list.appendChild(btn);
            });
            panel.classList.add('open');
        }

        function toggleSources() {
            document.getElementById('sources-section').classList.toggle('collapsed');
        }

        var GITHUB_BASE = 'https://github.com/aws-samples/aws-mainframe-modernization-carddemo/blob/main/app/';
        function githubUrl(filePath, startLine, endLine) {
            if (!filePath) return '#';
            var match = filePath.match(/app[\/\\](.+)$/);
            var rel = match ? match[1] : filePath.replace(/.*[\/\\]/, '');
            var url = GITHUB_BASE + rel + '#L' + (startLine || 1);
            if (endLine && endLine > startLine) url += '-L' + endLine;
            return url;
        }

        function getScoreTier(score) {
            if (score >= 0.8) return 'high';
            if (score >= 0.5) return 'mid';
            return 'low';
        }

        function renderPerfBar(stats) {
            var bar = document.getElementById('perf-bar');
            if (!stats || Object.keys(stats).length === 0) {
                bar.classList.remove('visible');
                return;
            }
            var items = [];
            if (stats.rag_s != null) {
                var ragLabel = stats.rag_cached ? 'RAG (cached)' : 'RAG';
                items.push('<span class="perf-item"><span class="perf-label">' + ragLabel + '</span><span class="perf-value">' + stats.rag_s.toFixed(2) + 's</span></span>');
            }
            if (stats.llm_first_token_s != null) {
                items.push('<span class="perf-item"><span class="perf-label">LLM TTFT</span><span class="perf-value">' + stats.llm_first_token_s.toFixed(2) + 's</span></span>');
            }
            if (stats.llm_total_s != null) {
                items.push('<span class="perf-item"><span class="perf-label">LLM Total</span><span class="perf-value">' + stats.llm_total_s.toFixed(2) + 's</span></span>');
            }
            if (stats.total_s != null) {
                items.push('<span class="perf-item"><span class="perf-label">Total</span><span class="perf-value">' + stats.total_s.toFixed(2) + 's</span></span>');
            }
            if (stats.tokens_in != null) {
                items.push('<span class="perf-item"><span class="perf-label">Tokens</span><span class="perf-value">' + stats.tokens_in.toLocaleString() + ' in / ' + stats.tokens_out.toLocaleString() + ' out</span></span>');
            }
            if (stats.chunks != null) {
                items.push('<span class="perf-item"><span class="perf-label">Chunks</span><span class="perf-value">' + stats.chunks + '</span></span>');
            }
            if (stats.model) {
                items.push('<span class="perf-item"><span class="perf-label">Model</span><span class="perf-value">' + escapeHtml(stats.model) + '</span></span>');
            }
            if (stats.l2_cached) {
                items.push('<span class="perf-item"><span class="perf-cached">L2 CACHED</span></span>');
            }
            bar.innerHTML = items.join('');
            bar.classList.add('visible');
        }

        function renderSources(sources) {
            const sourcesList = document.getElementById('sources-list');
            sourcesList.innerHTML = '';
            document.getElementById('source-count').textContent = sources.length;

            sources.forEach(function(s) {
                const tier = getScoreTier(s.score);
                const pct = s.score != null ? (s.score * 100).toFixed(1) + '%' : 'n/a';
                const sourceBody = ((s.preamble || '') + '\n\n' + (s.content || '')).trim();

                const div = document.createElement('div');
                div.className = 'source-item score-' + tier;

                div.innerHTML =
                    '<div class="source-top">' +
                        '<span class="source-file">' + escapeHtml(s.file_name + ':' + s.start_line + '-' + s.end_line) + '</span>' +
                        '<span class="score-label ' + tier + '">' + pct + '</span>' +
                    '</div>' +
                    '<div class="source-meta">' + escapeHtml(s.name) + ' &middot; ' + escapeHtml(s.chunk_type || '') + '</div>' +
                    '<div class="source-actions">' +
                        '<button type="button" class="btn-context">Show Chunk</button>' +
                        '<a class="btn-file" href="' + githubUrl(s.file_path, s.start_line, s.end_line) + '" target="_blank" rel="noopener">Full File</a>' +
                    '</div>' +
                    '<div class="source-content"></div>';

                const sourceContent = div.querySelector('.source-content');
                sourceContent.textContent = sourceBody;

                var chunkBtn = div.querySelector('.btn-context');
                chunkBtn.addEventListener('click', function() {
                    var isVisible = sourceContent.style.display === 'block';
                    sourceContent.style.display = isVisible ? 'none' : 'block';
                    chunkBtn.textContent = isVisible ? 'Show Chunk' : 'Hide Chunk';
                });

                // "Full File" is now an <a> link, no click handler needed

                sourcesList.appendChild(div);
            });

            document.getElementById('sources-section').classList.remove('collapsed');
        }

        async function handleSubmit(e) {
            e.preventDefault();
            const question = document.getElementById('question').value.trim();
            if (!question) return;

            const fileType = document.getElementById('cfg-filetype').value;
            const topK = parseInt(document.getElementById('cfg-topk').value, 10);
            const model = document.getElementById('cfg-model').value;
            const l1Cache = document.getElementById('cfg-l1cache').checked;
            const l2Cache = document.getElementById('cfg-l2cache').checked;
            const useStream = document.getElementById('cfg-stream').checked;

            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('answer-box').style.display = 'none';
            document.getElementById('perf-bar').classList.remove('visible');
            document.getElementById('sources-list').innerHTML = '';
            document.getElementById('source-count').textContent = '0';

            const payload = {
                question,
                file_type: fileType || null,
                top_k: topK,
                model: model,
                l1_cache: l1Cache,
                l2_cache: l2Cache,
            };

            try {
                if (useStream) {
                    const resp = await fetch('/api/ask/stream', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                    });

                    if (!resp.ok) {
                        throw new Error('Server returned ' + resp.status);
                    }

                    const reader = resp.body.getReader();
                    const decoder = new TextDecoder();
                    let answerText = '';
                    let buffer = '';
                    let sourcesEvent = false;

                    document.getElementById('answer-content').innerHTML = '<span class="stream-cursor">Thinking\u2026</span>';
                    document.getElementById('answer-box').style.display = 'block';
                    document.getElementById('loading').style.display = 'none';

                    let pendingEvent = null;
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });

                        const lines = buffer.split('\n');
                        buffer = lines.pop();

                        for (const line of lines) {
                            if (line.startsWith('event: ')) {
                                pendingEvent = line.slice(7).trim();
                            } else if (line.startsWith('data: ')) {
                                const raw = line.slice(6);
                                if (pendingEvent === 'done') {
                                    pendingEvent = null;
                                    continue;
                                }
                                if (pendingEvent === 'error') {
                                    try { answerText = 'Error: ' + JSON.parse(raw); } catch(_) { answerText = 'Error: ' + raw; }
                                    document.getElementById('answer-content').textContent = answerText;
                                    pendingEvent = null;
                                    continue;
                                }
                                if (pendingEvent === 'sources') {
                                    try { renderSources(JSON.parse(raw)); } catch(_) {}
                                    pendingEvent = null;
                                    continue;
                                }
                                if (pendingEvent === 'stats') {
                                    try { renderPerfBar(JSON.parse(raw)); } catch(_) {}
                                    pendingEvent = null;
                                    continue;
                                }
                                pendingEvent = null;
                                try {
                                    const token = JSON.parse(raw);
                                    answerText += token;
                                    document.getElementById('answer-content').innerHTML = marked.parse(answerText);
                                } catch(_) {}
                            }
                        }
                    }
                } else {
                    const resp = await fetch('/api/ask', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                    });

                    if (!resp.ok) {
                        throw new Error('Server returned ' + resp.status);
                    }

                    const data = await resp.json();

                    if (data.error) {
                        document.getElementById('answer-content').innerHTML =
                            '<span class="error">' + escapeHtml(data.error) + '</span>';
                    } else {
                        document.getElementById('answer-content').innerHTML = marked.parse(data.answer);
                    }

                    renderSources(data.sources || []);
                    renderPerfBar(data.stats || {});
                    document.getElementById('answer-box').style.display = 'block';
                }

            } catch (err) {
                document.getElementById('answer-content').innerHTML =
                    '<span class="error">Error: ' + escapeHtml(err.message) + '</span>';
                document.getElementById('answer-box').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
                btn.disabled = false;
            }
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str || ''));
            return div.innerHTML;
        }
