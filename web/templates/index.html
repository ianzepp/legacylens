<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegacyLens - AI-Powered COBOL Insights</title>
    <!-- Monofonto: Fallout 3/NV Pip-Boy UI font (Typodermic, free commercial) -->
    <link href="https://fonts.cdnfonts.com/css/monofonto" rel="stylesheet">
    <style>
        /* IBM 3270: The actual IBM mainframe terminal font (SIL OFL) */
        @font-face {
            font-family: 'IBM 3270';
            src: url('/static/fonts/3270-Regular.woff') format('woff'),
                 url('/static/fonts/3270-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        /* ── Design Tokens ── */
        :root {
            --bg-primary: #1a1e24;
            --bg-panel: #232830;
            --bg-answer: #faf3e0;
            --border-panel: #3a4050;
            --border-accent: #d4a24e;
            --text-primary: #e8e0d0;
            --text-answer: #2a2520;
            --text-label: #d4a24e;
            --text-muted: #6a7080;
            --accent-green: #4ade80;
            --accent-teal: #2dd4bf;
            --accent-danger: #ef4444;
            --score-high: #4ade80;
            --score-mid: #d4a24e;
            --score-low: #6a7080;
            --font-display: 'Monofonto', monospace;
            --font-body: 'IBM 3270', monospace;
        }

        /* ── Reset & Base ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 15px;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Subtle scanline overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.03) 2px,
                rgba(0, 0, 0, 0.03) 4px
            );
            z-index: 9999;
        }

        /* ── Layout ── */
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 1.5rem 3rem;
        }

        /* ── Header ── */
        .header {
            padding: 2rem 0 1.5rem;
            border-bottom: 1px solid var(--border-panel);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-logo {
            width: 40px;
            height: 40px;
            border: 2px solid var(--accent-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--accent-green);
            font-size: 1.2rem;
            text-shadow: 0 0 8px rgba(74, 222, 128, 0.4);
            box-shadow: 0 0 8px rgba(74, 222, 128, 0.15);
        }

        .header-text h1 {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-label);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .header-text .subtitle {
            font-family: var(--font-display);
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* ── Search Bar ── */
        .search-row {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }

        .search-input {
            flex: 1;
            background: var(--bg-panel);
            border: 1px solid var(--border-panel);
            border-radius: 4px;
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input::placeholder { color: var(--text-muted); }

        .search-input:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.12);
        }

        .btn-analyze {
            background: var(--accent-green);
            color: var(--bg-primary);
            border: none;
            border-radius: 4px;
            padding: 0.75rem 1.5rem;
            font-family: var(--font-display);
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .btn-analyze:hover { background: var(--accent-teal); }
        .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── Config Row ── */
        .config-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .config-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            min-width: 0;
        }

        .config-group.flex-1 { flex: 1; min-width: 140px; }

        .config-label {
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-label);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .config-select {
            background: var(--bg-panel);
            border: 1px solid var(--border-panel);
            border-radius: 4px;
            padding: 0.45rem 0.6rem;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .config-select:focus { border-color: var(--accent-green); }

        /* ── Loading ── */
        #loading {
            display: none;
            margin: 2rem 0;
            text-align: center;
        }

        .loading-text {
            font-family: var(--font-display);
            font-size: 0.9rem;
            color: var(--accent-green);
            text-shadow: 0 0 8px rgba(74, 222, 128, 0.3);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .loading-bar {
            margin-top: 0.75rem;
            height: 2px;
            background: var(--border-panel);
            border-radius: 1px;
            overflow: hidden;
        }

        .loading-bar-inner {
            height: 100%;
            width: 30%;
            background: var(--accent-green);
            border-radius: 1px;
            animation: scan 1.5s ease-in-out infinite;
        }

        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }

        /* ── Answer Panel ── */
        #answer-box { display: none; }

        .answer-panel {
            position: relative;
            background: var(--bg-answer);
            border: 2px solid var(--border-accent);
            border-radius: 4px;
            padding: 1.5rem 1.25rem 1.25rem;
            margin-top: 1.5rem;
            min-height: 120px;
        }

        .answer-label {
            position: absolute;
            top: -0.65rem;
            left: 1rem;
            background: var(--bg-panel);
            border: 1px solid var(--border-accent);
            border-radius: 3px;
            padding: 0.1rem 0.6rem;
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-label);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        #answer-content {
            color: var(--text-answer);
            font-family: var(--font-body);
            font-size: 0.9rem;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .error { color: var(--accent-danger); }

        /* ── Sources ── */
        .sources-section {
            margin-top: 1.25rem;
        }

        .sources-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            padding: 0.6rem 0;
            user-select: none;
        }

        .sources-header:hover .sources-title { color: var(--accent-teal); }

        .sources-title {
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-label);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.2s;
        }

        .sources-toggle {
            font-size: 0.7rem;
            color: var(--text-muted);
            transition: transform 0.2s;
        }

        .sources-section.collapsed .sources-toggle { transform: rotate(-90deg); }
        .sources-section.collapsed .sources-list { display: none; }

        .sources-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 0.25rem;
        }

        .source-item {
            background: var(--bg-panel);
            border-radius: 0 4px 4px 0;
            padding: 0.6rem 0.75rem;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .source-item:hover { opacity: 0.85; }

        .source-item.score-high { border-left: 3px solid var(--score-high); }
        .source-item.score-mid  { border-left: 3px solid var(--score-mid); }
        .source-item.score-low  { border-left: 3px solid var(--score-low); }

        .source-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
        }

        .source-file {
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .score-badge {
            display: inline-block;
            padding: 0.1rem 0.5rem;
            border-radius: 3px;
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .score-badge.high { background: var(--score-high); color: var(--bg-primary); }
        .score-badge.mid  { background: var(--score-mid); color: var(--bg-primary); }
        .score-badge.low  { background: var(--score-low); color: var(--text-primary); }

        .source-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        .source-content {
            display: none;
            margin-top: 0.5rem;
            padding: 0.6rem;
            background: var(--bg-primary);
            border-radius: 4px;
            font-family: var(--font-body);
            font-size: 0.78rem;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .source-item.expanded .source-content { display: block; }

        .btn-context {
            display: inline-block;
            margin-top: 0.5rem;
            background: transparent;
            border: 1px solid var(--accent-green);
            border-radius: 3px;
            padding: 0.3rem 0.7rem;
            color: var(--accent-green);
            font-family: var(--font-display);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .btn-context:hover {
            background: var(--accent-green);
            color: var(--bg-primary);
        }

        .btn-context:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ── Footer ── */
        .footer {
            margin-top: 2rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border-panel);
            text-align: center;
            font-family: var(--font-display);
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .header h1 { font-size: 1.5rem; }
            .search-row { flex-direction: column; }
            .btn-analyze { width: 100%; }
            .config-row { flex-direction: column; }
            .config-group.flex-1 { min-width: 100%; }
            .answer-panel { padding: 1.25rem 1rem 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-logo">&#9762;</div>
            <div class="header-text">
                <h1>LegacyLens</h1>
                <div class="subtitle">AI-Powered COBOL Insights</div>
            </div>
        </header>

        <!-- Search -->
        <form id="query-form" onsubmit="return handleSubmit(event)">
            <div class="search-row">
                <input
                    type="text"
                    id="question"
                    class="search-input"
                    placeholder="Ask your COBOL question..."
                    required
                    autofocus
                >
                <button type="submit" class="btn-analyze" id="btn-submit">Analyze</button>
            </div>

            <!-- Config -->
            <div class="config-row">
                <div class="config-group flex-1">
                    <label class="config-label" for="cfg-index">Index</label>
                    <select id="cfg-index" class="config-select">
                        <option value="legacylens">legacylens</option>
                    </select>
                </div>
                <div class="config-group flex-1">
                    <label class="config-label" for="cfg-model">Model</label>
                    <select id="cfg-model" class="config-select">
                        <option value="gpt-4o-mini">gpt-4o-mini</option>
                        <option value="gpt-4o">gpt-4o</option>
                        <option value="gpt-4.1-mini">gpt-4.1-mini</option>
                        <option value="gpt-4.1">gpt-4.1</option>
                    </select>
                </div>
                <div class="config-group flex-1">
                    <label class="config-label" for="cfg-filetype">File Type</label>
                    <select id="cfg-filetype" class="config-select">
                        <option value="">All files</option>
                        <option value="cbl">COBOL (.cbl)</option>
                        <option value="cpy">Copybooks (.cpy)</option>
                        <option value="bms">BMS Maps (.bms)</option>
                        <option value="jcl">JCL (.jcl)</option>
                        <option value="ctl">Control (.ctl)</option>
                        <option value="dcl">DB2 DCL (.dcl)</option>
                        <option value="ddl">DDL (.ddl)</option>
                        <option value="csd">CICS CSD (.csd)</option>
                        <option value="dbd">IMS DBD (.dbd)</option>
                        <option value="psb">IMS PSB (.psb)</option>
                    </select>
                </div>
                <div class="config-group">
                    <label class="config-label" for="cfg-topk">Top-K</label>
                    <select id="cfg-topk" class="config-select">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="15">15</option>
                        <option value="20">20</option>
                    </select>
                </div>
            </div>
        </form>

        <!-- Loading -->
        <div id="loading">
            <div class="loading-text">Scanning codebase...</div>
            <div class="loading-bar"><div class="loading-bar-inner"></div></div>
        </div>

        <!-- Results -->
        <div id="answer-box">
            <div class="answer-panel">
                <span class="answer-label">Answer</span>
                <div id="answer-content"></div>
            </div>

            <div class="sources-section" id="sources-section">
                <div class="sources-header" onclick="toggleSources()">
                    <span class="sources-title">Source References (<span id="source-count">0</span>)</span>
                    <span class="sources-toggle">&#9660;</span>
                </div>
                <div class="sources-list" id="sources-list"></div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            System Status: Online since 1963. Declassified.
        </footer>
    </div>

    <script>
        function toggleSources() {
            document.getElementById('sources-section').classList.toggle('collapsed');
        }

        function getScoreTier(score) {
            if (score >= 0.8) return 'high';
            if (score >= 0.5) return 'mid';
            return 'low';
        }

        async function handleSubmit(e) {
            e.preventDefault();
            const question = document.getElementById('question').value.trim();
            if (!question) return;

            const fileType = document.getElementById('cfg-filetype').value;
            const topK = parseInt(document.getElementById('cfg-topk').value, 10);
            const model = document.getElementById('cfg-model').value;

            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('answer-box').style.display = 'none';

            try {
                const resp = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question,
                        file_type: fileType || null,
                        top_k: topK,
                        model: model,
                    }),
                });
                const data = await resp.json();

                if (data.error) {
                    document.getElementById('answer-content').innerHTML =
                        '<span class="error">' + escapeHtml(data.error) + '</span>';
                } else {
                    document.getElementById('answer-content').textContent = data.answer;
                }

                // Build sources
                const sourcesList = document.getElementById('sources-list');
                sourcesList.innerHTML = '';
                const sources = data.sources || [];
                document.getElementById('source-count').textContent = sources.length;

                sources.forEach(function(s) {
                    const tier = getScoreTier(s.score);
                    const pct = (s.score * 100).toFixed(1) + '%';
                    const sourceBody = ((s.preamble || '') + '\n\n' + (s.content || '')).trim();

                    const div = document.createElement('div');
                    div.className = 'source-item score-' + tier;

                    div.innerHTML =
                        '<div class="source-top">' +
                            '<span class="source-file">' + escapeHtml(s.file_name + ':' + s.start_line + '-' + s.end_line) + '</span>' +
                            '<span class="score-badge ' + tier + '">' + pct + '</span>' +
                        '</div>' +
                        '<div class="source-meta">' + escapeHtml(s.name) + ' &middot; ' + escapeHtml(s.chunk_type || '') + ' &middot; ' + escapeHtml(s.file_path || '') + '</div>' +
                        '<div class="source-content"></div>' +
                        '<button type="button" class="btn-context">Load file context</button>';

                    const sourceContent = div.querySelector('.source-content');
                    sourceContent.textContent = sourceBody;

                    // Click to expand/collapse
                    div.addEventListener('click', function(event) {
                        if (event.target.closest('.btn-context')) return;
                        div.classList.toggle('expanded');
                    });

                    // Load full file
                    var contextBtn = div.querySelector('.btn-context');
                    contextBtn.addEventListener('click', async function(event) {
                        event.stopPropagation();
                        if (!s.file_path) {
                            sourceContent.textContent = 'File path unavailable.';
                            div.classList.add('expanded');
                            return;
                        }
                        contextBtn.disabled = true;
                        contextBtn.textContent = 'Loading...';
                        try {
                            const fileResp = await fetch('/api/file', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ file_path: s.file_path }),
                            });
                            const fileData = await fileResp.json();
                            if (fileData.error) {
                                sourceContent.textContent = 'Error: ' + fileData.error;
                            } else {
                                var suffix = fileData.truncated ? '\n\n[truncated to first 2000 lines]' : '';
                                sourceContent.textContent = fileData.content + suffix;
                            }
                            div.classList.add('expanded');
                        } catch (fileErr) {
                            sourceContent.textContent = 'Error: ' + fileErr.message;
                            div.classList.add('expanded');
                        } finally {
                            contextBtn.disabled = false;
                            contextBtn.textContent = 'Load file context';
                        }
                    });

                    sourcesList.appendChild(div);
                });

                document.getElementById('answer-box').style.display = 'block';

                // Ensure sources are expanded by default
                document.getElementById('sources-section').classList.remove('collapsed');

            } catch (err) {
                document.getElementById('answer-content').innerHTML =
                    '<span class="error">Error: ' + escapeHtml(err.message) + '</span>';
                document.getElementById('answer-box').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
                btn.disabled = false;
            }
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str || ''));
            return div.innerHTML;
        }
    </script>
</body>
</html>
